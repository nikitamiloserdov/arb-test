name: API tests (Newman)

on:
  workflow_dispatch:

  push:
    branches: [ "main" ]

  schedule:
    - cron: "*/15 * * * *"
    - cron: "5,20,35,50 * * * *"

jobs:
  newman:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      # =========================================================
      # 📥 Checkout
      # =========================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================
      # 🟢 Node.js
      # =========================================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================================================
      # 📦 Newman + Allure + HTML
      # =========================================================
      - name: Install Newman + reporters
        run: |
          npm install -g newman \
          newman-reporter-htmlextra \
          newman-reporter-allure

      # =========================================================
      # 🆔 RUN_ID (МСК)
      # =========================================================
      - name: Generate RUN_ID
        run: |
          RUN_ID=$(TZ=Europe/Moscow date +"%Y-%m-%d_%H-%M-%S")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      # =========================================================
      # ▶️ Run collection
      # =========================================================
      - name: Run collection
        continue-on-error: true
        run: |
          mkdir -p reports
          mkdir -p allure-results
          mkdir -p public/runs/${RUN_ID}

          newman run postman/collection.json \
            --env-var "r2u-domain=${{ secrets.R2U_DOMAIN }}" \
            --env-var "mail_domain=${{ secrets.MAIL_DOMAIN }}" \
            --delay-request 8000 \
            --reporters cli,htmlextra,allure,junit \
            --reporter-htmlextra-export reports/index.html \
            --reporter-allure-export allure-results \
            --reporter-junit-export reports/newman-report.xml

          cp reports/index.html public/runs/${RUN_ID}/index.html

      # =========================================================
      # 📂 Prepare TestOps results
      # =========================================================
      - name: Prepare TestOps results
        if: always()
        run: |
          mkdir -p testops-results
          cp -r allure-results/* testops-results/

      # =========================================================
      # 📥 Install allurectl
      # =========================================================
      - name: Install allurectl
        if: always()
        run: |
          curl -o allurectl -L https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64
          chmod +x allurectl
          sudo mv allurectl /usr/local/bin/allurectl

      # =========================================================
      # 📊 Upload to Allure TestOps
      # =========================================================
      - name: Upload to TestOps
        if: always()
        env:
          TESTOPS_ENDPOINT: ${{ secrets.TESTOPS_ENDPOINT }}
          TESTOPS_TOKEN: ${{ secrets.TESTOPS_TOKEN }}
          TESTOPS_PROJECT_ID: ${{ secrets.TESTOPS_PROJECT_ID }}
        run: |
          export ALLURE_ENDPOINT=${TESTOPS_ENDPOINT}
          export ALLURE_TOKEN=${TESTOPS_TOKEN}

          allurectl upload testops-results \
            --project-id ${TESTOPS_PROJECT_ID} \
            --launch-name "API Run • ${RUN_ID}"

          echo "ALLURE_LAUNCH_URL=${TESTOPS_ENDPOINT}/project/${TESTOPS_PROJECT_ID}/launches" >> $GITHUB_ENV

      # =========================================================
      # 📊 Upload HTML report (artifact)
      # =========================================================
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ env.RUN_ID }}
          path: reports/index.html

      # =========================================================
      # 🚀 Deploy to GitHub Pages (НЕ затирает историю)
      # =========================================================
      - name: Deploy to GitHub Pages
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          cp -r public /tmp/public

          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages

          mkdir -p runs
          cp -r /tmp/public/runs/${RUN_ID} runs/

          touch .nojekyll

          git add runs .nojekyll
          git commit -m "deploy run ${RUN_ID}" || echo "Nothing to commit"
          git push origin gh-pages


      # =========================================================
      # 🐍 Setup Python
      # =========================================================
      - name: Setup Python
        if: always()
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        if: always()
        run: pip install requests

      # =========================================================
      # 📩 Telegram
      # =========================================================
      - name: Send Telegram report
        if: always()
        env:
          TGBOT: ${{ secrets.TGBOT }}
          CHATID: ${{ secrets.CHATID }}
          RUN_ID: ${{ env.RUN_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TESTOPS_ENDPOINT: ${{ secrets.TESTOPS_ENDPOINT }}
          TESTOPS_PROJECT_ID: ${{ secrets.TESTOPS_PROJECT_ID }}
          ALLURE_LAUNCH_URL: ${{ env.ALLURE_LAUNCH_URL }}
        run: python scripts/send_telegram_report.py
